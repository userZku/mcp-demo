warnings:
  - |-
    Type Safety Issue: Heavy use of `any` in chat interface layers (src/client/core/chatCore.ts, src/client/core/cliChat.ts, src/client/core/webChat.ts, src/client/interfaces/cli.ts, src/client/interfaces/web.ts). Client/tools parameters lack type annotations. Recommend defining typed interfaces.
  - |-
    Hardcoded Model Reference: src/client/llm/ollama.ts line 22 uses hardcoded model name "qwen3:8b". Configuration should be externalized for flexibility.
  - |-
    Circular Architecture Risk: Client talks to Server via MCP over HTTP (src/client/mcp/client.ts → http://localhost:3001/mcp), while Server runs in same process context. No clear deployment boundary documented.
  - |-
    Error Handling Inconsistency: Some tools return isError: true (readFile, writeFile, weather), others throw exceptions. Normalize error handling pattern.
  - |-
    Web Assets Path Hardcoded: src/client/interfaces/web.ts line 5 uses hardcoded path "web/public" for static assets. Relative path may fail if run from different directory.
  - |-
    Missing Schema Definitions: Multiple tools use incomplete Zod schemas (readFile.ts inputSchema only has filepath: z.string() without properties wrapper). Verify OpenAPI/MCP schema compliance.
