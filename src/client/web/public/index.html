<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistant IA</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 Assistant IA</h1>
    </div>

    <div id="chat">
      <div class="empty-state">
        <p>👋 Bienvenue ! Commencez une conversation...</p>
      </div>
    </div>

    <div class="input-area">
      <input 
        id="input" 
        type="text" 
        placeholder="Tapez votre message..." 
        autocomplete="off"
      />
      <button id="sendBtn" onclick="send()">Envoyer</button>
    </div>
  </div>

  <script src="chat.js"></script>
</body>
</html>
