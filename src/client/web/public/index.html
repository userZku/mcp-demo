<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistant IA</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 700px;
    height: 80vh;
    max-height: 600px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 20px;
    text-align: center;
  }

  .header h1 {
    font-size: 24px;
    margin: 0;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .message {
    display: flex;
    animation: slideIn 0.3s ease-out;
  }

  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .message.user {
    justify-content: flex-end;
  }

  .message.user .content {
    background: #667eea;
    color: white;
  }

  .message.assistant .content {
    background: #f0f0f0;
    color: #333;
  }

  .content {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.5;
    word-wrap: break-word;
  }

  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: #f0f0f0;
    border-radius: 12px;
    width: fit-content;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #999;
    animation: typing 1.4s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-10px); }
  }

  .input-area {
    padding: 15px;
    background: #f9f9f9;
    border-top: 1px solid #e0e0e0;
    display: flex;
    gap: 10px;
  }

  input[type="text"] {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
  }

  button {
    padding: 12px 24px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  button:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
  }

  button:active:not(:disabled) {
    transform: translateY(0);
  }

  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .error {
    background: #fee;
    color: #c00;
    padding: 12px 16px;
    border-radius: 8px;
    border-left: 4px solid #c00;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #999;
    text-align: center;
  }

  .empty-state svg {
    width: 64px;
    height: 64px;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  /* Scrollbar styling */
  #chat::-webkit-scrollbar {
    width: 8px;
  }

  #chat::-webkit-scrollbar-track {
    background: #f1f1f1;
  }

  #chat::-webkit-scrollbar-thumb {
    background: #888;
    border-radius: 4px;
  }

  #chat::-webkit-scrollbar-thumb:hover {
    background: #555;
  }

  @media (max-width: 600px) {
    .container {
      height: 100vh;
      max-height: none;
      border-radius: 0;
    }

    .content {
      max-width: 85%;
    }

    button {
      padding: 10px 16px;
      font-size: 14px;
    }

    .header h1 {
      font-size: 20px;
    }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🤖 Assistant IA</h1>
  </div>

  <div id="chat">
    <div class="empty-state">
      <p>👋 Bienvenue ! Commencez une conversation...</p>
    </div>
  </div>

  <div class="input-area">
    <input 
      id="input" 
      type="text" 
      placeholder="Tapez votre message..." 
      autocomplete="off"
    />
    <button id="sendBtn" onclick="send()">Envoyer</button>
  </div>
</div>

<script>
let isLoading = false;

const inputElement = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const chatDiv = document.getElementById("chat");

// Gestion du bouton Enter
inputElement.addEventListener("keypress", (e) => {
  if (e.key === "Enter" && !isLoading) {
    send();
  }
});

function clearEmptyState() {
  if (chatDiv.querySelector(".empty-state")) {
    chatDiv.innerHTML = "";
  }
}

function scrollToBottom() {
  setTimeout(() => {
    chatDiv.scrollTop = chatDiv.scrollHeight;
  }, 0);
}

function addMessage(text, role) {
  clearEmptyState();
  const messageDiv = document.createElement("div");
  messageDiv.className = `message ${role}`;
  
  const contentDiv = document.createElement("div");
  contentDiv.className = "content";
  contentDiv.textContent = text;
  
  messageDiv.appendChild(contentDiv);
  chatDiv.appendChild(messageDiv);
  scrollToBottom();
}

function addTypingIndicator() {
  clearEmptyState();
  const messageDiv = document.createElement("div");
  messageDiv.className = "message assistant";
  messageDiv.id = "typing-indicator";
  
  const indicator = document.createElement("div");
  indicator.className = "typing-indicator";
  indicator.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  
  messageDiv.appendChild(indicator);
  chatDiv.appendChild(messageDiv);
  scrollToBottom();
}

function removeTypingIndicator() {
  const indicator = document.getElementById("typing-indicator");
  if (indicator) {
    indicator.remove();
  }
}

function addError(message) {
  clearEmptyState();
  const errorDiv = document.createElement("div");
  errorDiv.className = "error";
  errorDiv.textContent = "❌ Erreur : " + message;
  chatDiv.appendChild(errorDiv);
  scrollToBottom();
}

async function send() {
  const input = inputElement.value.trim();
  if (!input || isLoading) return;

  isLoading = true;
  sendBtn.disabled = true;
  inputElement.disabled = true;

  try {
    addMessage(input, "user");
    inputElement.value = "";
    
    addTypingIndicator();

    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: input })
    });

    removeTypingIndicator();

    if (!res.ok) {
      throw new Error(`Erreur ${res.status}: ${res.statusText}`);
    }

    const data = await res.json();
    
    if (data.response) {
      addMessage(data.response, "assistant");
    } else {
      addError("Réponse vide du serveur");
    }
  } catch (error) {
    removeTypingIndicator();
    addError(error.message || "Impossible de contacter le serveur");
    console.error("Erreur:", error);
  } finally {
    isLoading = false;
    sendBtn.disabled = false;
    inputElement.disabled = false;
    inputElement.focus();
  }
}

// Focus initial
inputElement.focus();
</script>
</body>
</html>
